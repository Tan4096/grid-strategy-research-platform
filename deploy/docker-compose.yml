services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    env_file:
      - .env
    environment:
      APP_LOG_LEVEL: ${APP_LOG_LEVEL}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      APP_AUTH_ENABLED: ${APP_AUTH_ENABLED}
      APP_PUBLIC_MODE: ${APP_PUBLIC_MODE}
      APP_AUTH_API_KEYS: ${APP_AUTH_API_KEYS}
      APP_AUTH_BEARER_TOKENS: ${APP_AUTH_BEARER_TOKENS}
      APP_AUTH_JWT_SECRET: ${APP_AUTH_JWT_SECRET}
      APP_AUTH_JWT_ALGORITHM: ${APP_AUTH_JWT_ALGORITHM}
      APP_AUTH_JWT_AUDIENCE: ${APP_AUTH_JWT_AUDIENCE}
      APP_AUTH_JWT_ISSUER: ${APP_AUTH_JWT_ISSUER}
      APP_AUTH_JWT_ROLE_CLAIM: ${APP_AUTH_JWT_ROLE_CLAIM}
      APP_AUTH_JWT_SUB_CLAIM: ${APP_AUTH_JWT_SUB_CLAIM}
      APP_TASK_BACKEND: ${APP_TASK_BACKEND}
      APP_BACKTEST_TASK_BACKEND: ${APP_BACKTEST_TASK_BACKEND}
      APP_OPTIMIZATION_TASK_BACKEND: ${APP_OPTIMIZATION_TASK_BACKEND}
      APP_ARQ_REDIS_DSN: ${APP_ARQ_REDIS_DSN}
      APP_ARQ_QUEUE_NAME: ${APP_ARQ_QUEUE_NAME}
      APP_ARQ_MAX_JOBS: ${APP_ARQ_MAX_JOBS}
      APP_ARQ_JOB_TIMEOUT_SECONDS: ${APP_ARQ_JOB_TIMEOUT_SECONDS}
      APP_STATE_REDIS_ENABLED: ${APP_STATE_REDIS_ENABLED}
      APP_STATE_REDIS_DSN: ${APP_STATE_REDIS_DSN}
      APP_CONCURRENCY_LIMIT_ENABLED: ${APP_CONCURRENCY_LIMIT_ENABLED}
      APP_CONCURRENCY_LIMIT_PER_SUBJECT: ${APP_CONCURRENCY_LIMIT_PER_SUBJECT}
      APP_CONCURRENCY_LIMIT_PER_IP: ${APP_CONCURRENCY_LIMIT_PER_IP}
      APP_CONCURRENCY_LIMIT_GLOBAL: ${APP_CONCURRENCY_LIMIT_GLOBAL}
      OPTIMIZATION_SELECTED_CLEAR_MAX: ${OPTIMIZATION_SELECTED_CLEAR_MAX}
      OPTIMIZATION_SELECTED_CLEAR_MAX_PUBLIC: ${OPTIMIZATION_SELECTED_CLEAR_MAX_PUBLIC}
      OPTIMIZATION_RECOVERY_ENABLED: ${OPTIMIZATION_RECOVERY_ENABLED}
      OPTIMIZATION_RECOVERY_MAX_JOBS: ${OPTIMIZATION_RECOVERY_MAX_JOBS}
      OPTIMIZATION_RECOVERY_SCAN_LIMIT: ${OPTIMIZATION_RECOVERY_SCAN_LIMIT}
      OPTIMIZATION_JOB_TTL_SECONDS: ${OPTIMIZATION_JOB_TTL_SECONDS}
      OPTIMIZATION_MAX_JOB_RECORDS: ${OPTIMIZATION_MAX_JOB_RECORDS}
      OPTIMIZATION_STORE_PATH: ${OPTIMIZATION_STORE_PATH}
      BACKTEST_STORE_PATH: ${BACKTEST_STORE_PATH}
      OPTIMIZATION_PERSIST_ROWS_LIMIT: ${OPTIMIZATION_PERSIST_ROWS_LIMIT}
      BACKEND_WORKERS: ${BACKEND_WORKERS}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - redis
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  arq-worker:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    env_file:
      - .env
    environment:
      APP_LOG_LEVEL: ${APP_LOG_LEVEL}
      APP_TASK_BACKEND: ${APP_TASK_BACKEND}
      APP_BACKTEST_TASK_BACKEND: ${APP_BACKTEST_TASK_BACKEND}
      APP_OPTIMIZATION_TASK_BACKEND: ${APP_OPTIMIZATION_TASK_BACKEND}
      APP_ARQ_REDIS_DSN: ${APP_ARQ_REDIS_DSN}
      APP_ARQ_QUEUE_NAME: ${APP_ARQ_QUEUE_NAME}
      APP_ARQ_MAX_JOBS: ${APP_ARQ_MAX_JOBS}
      APP_ARQ_JOB_TIMEOUT_SECONDS: ${APP_ARQ_JOB_TIMEOUT_SECONDS}
      APP_STATE_REDIS_ENABLED: ${APP_STATE_REDIS_ENABLED}
      APP_STATE_REDIS_DSN: ${APP_STATE_REDIS_DSN}
      OPTIMIZATION_STORE_PATH: ${OPTIMIZATION_STORE_PATH}
      BACKTEST_STORE_PATH: ${BACKTEST_STORE_PATH}
      OPTIMIZATION_PERSIST_ROWS_LIMIT: ${OPTIMIZATION_PERSIST_ROWS_LIMIT}
    command: ["sh", "-lc", "arq app.tasks.arq_worker.WorkerSettings"]
    depends_on:
      - redis
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  redis-data:
