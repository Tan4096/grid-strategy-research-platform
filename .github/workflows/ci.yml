name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure ripgrep is available
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Run repository hygiene and secret scan
        run: bash release/check-open-source-readiness.sh

  backend-pytest:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint backend
        env:
          PYTHONPATH: .
        run: python -m ruff check app/api app/core app/tasks/arq_queue.py

      - name: Type-check backend
        env:
          PYTHONPATH: .
        run: python -m mypy

      - name: Run backend tests
        env:
          PYTHONPATH: .
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate API types
        run: npm run gen:api-types

      - name: Check generated API types drift
        run: git diff --exit-code -- src/lib/api.generated.ts

      - name: Lint frontend
        run: npm run lint

      - name: Type-check frontend
        run: npm run typecheck

      - name: Run frontend unit tests
        run: npm run test:unit

      - name: Build frontend
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend e2e tests
        run: npm run test:e2e

  frontend-e2e-live:
    runs-on: ubuntu-latest
    needs: [backend-pytest, frontend-build]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Prepare live backend env
        run: |
          cp deploy/.env.example deploy/.env
          python3 - <<'PY'
from pathlib import Path
path = Path('deploy/.env')
text = path.read_text()
text = text.replace('CORS_ALLOW_ORIGINS=http://localhost:5173,http://127.0.0.1:5173', 'CORS_ALLOW_ORIGINS=http://127.0.0.1:4173,http://localhost:4173')
text = text.replace('BACKEND_PORT=8000', 'BACKEND_PORT=8000')
path.write_text(text)
PY

      - name: Start live backend stack
        run: docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d --build redis backend arq-worker

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file deploy/.env -f deploy/docker-compose.yml logs backend
          exit 1

      - name: Run live backend e2e tests
        working-directory: frontend
        env:
          E2E_REAL_BACKEND: "1"
        run: npm run test:e2e -- tests/e2e/live-backend.spec.ts

      - name: Stop live backend stack
        if: always()
        run: docker compose --env-file deploy/.env -f deploy/docker-compose.yml down -v
